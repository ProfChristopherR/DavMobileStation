name: Daily Weather Forecast

on:
  schedule:
    - cron: '0 0 * * *' # Run at 00:00 UTC every day
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pronostico

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        path: '.' # Ensure checkout is at root

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests arcgis urllib3

    - name: Run forecast script
      env:
        ARCGIS_USERNAME: ${{ secrets.ARCGIS_USERNAME }}
        ARCGIS_PASSWORD: ${{ secrets.ARCGIS_PASSWORD }}
      run: python actualizar_pronosticos.py
