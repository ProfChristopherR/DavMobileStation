name: Daily Weather Forecast

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC
  workflow_dispatch: # Gatillo manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Instalamos las librerías necesarias
        pip install pandas requests arcgis urllib3

    - name: Run forecast script
      env:
        ARCGIS_USERNAME: ${{ secrets.ARCGIS_USERNAME }}
        ARCGIS_PASSWORD: ${{ secrets.ARCGIS_PASSWORD }}
      run: |
        # Entramos a la carpeta donde está TODO y ejecutamos
        cd pronostico
        python actualizar_pronosticos.py
